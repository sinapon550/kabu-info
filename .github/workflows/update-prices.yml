name: 株価を毎朝自動更新

on:
  schedule:
    # 21:00 UTC = 翌 06:00 JST（毎日）
    - cron: '0 21 * * *'
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: yfinance を入れる
        run: pip install --quiet yfinance

      - name: 株価を取得して prices.json を更新
        run: python update_prices.py

      - name: 変更があればコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: 株価を自動更新"
            git push
          fi
